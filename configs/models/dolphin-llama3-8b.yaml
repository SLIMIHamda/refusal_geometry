_base_: ../base.yaml

# Reference model (thesis baseline). Locked facts: bf16, 32 layers, d=4096,
# steer at MLP block of layers 13-16.
model:
  id: cognitivecomputations/dolphin-2.9-llama3-8b
  revision: main
  family: llama-3
  alignment: uncensored
  recipe: synthetic-sft        # vs 'abliterated' (weight-surgery) — C1 recipe split
  dtype: bfloat16
  n_layers: 32
  d_model: 4096
  steer_layers: [13, 14, 15, 16]
